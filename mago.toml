[source]
paths = ["src", "examples/quickstart/app"]
# Composer依存のThird-partyコードを型解決のためparseするが分析・Lint・Format対象外。
includes = [
  "vendor/doctrine/dbal",
  "vendor/doctrine/event-manager",
  "vendor/doctrine/migrations",
  "vendor/nikic/fast-route/src",
  "vendor/monolog/monolog/src/Monolog",
  "vendor/psr/clock",
  "vendor/psr/container",
  "vendor/psr/cache",
  "vendor/psr/http-factory",
  "vendor/psr/http-message",
  "vendor/psr/http-server-handler",
  "vendor/psr/log",
  "vendor/symfony/console",
  "vendor/symfony/dependency-injection",
  "vendor/symfony/stopwatch",
  "vendor/symfony/translation-contracts",
  "vendor/symfony/uid",
  "vendor/symfony/validator",
]

[analyzer]
[linter]
[linter.rules.excessive-parameter-list]
# 確定済みの不変Envelopeに合わせ、Constructorの閾値だけ緩める。
constructor-threshold = 9
[formatter]
