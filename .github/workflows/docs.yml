name: Documentation delivery

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCUMENTATION_ARTIFACT: blackops-documentation-site
  NODE_VERSION: 24.18.0
  PNPM_VERSION: 11.12.0
  WRANGLER_VERSION: 4.110.0

jobs:
  build:
    name: Build documentation artifact
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: docs-build-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install pinned website toolchain
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Verify toolchain versions
        run: |
          set -euo pipefail
          test "$(node --version)" = "v${NODE_VERSION}"
          test "$(pnpm --version)" = "${PNPM_VERSION}"

      - name: Install website dependencies
        run: pnpm --dir docs/website install --frozen-lockfile

      - name: Verify pinned Wrangler
        run: test "$(pnpm --dir docs/website exec wrangler --version)" = "${WRANGLER_VERSION}"

      - name: Test website content pipeline
        run: pnpm --dir docs/website run test

      - name: Check website
        run: pnpm --dir docs/website run check

      - name: Build website
        run: pnpm --dir docs/website run build

      - name: Guard public artifact boundary
        run: |
          set -euo pipefail
          test -f docs/website/dist/index.html
          if rg -n 'docs/internal|develop/' docs/website/dist; then
            echo "Website artifact contains non-public documentation." >&2
            exit 1
          fi

      - name: Explain fork preview boundary
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: echo "::notice::Fork pull request passed the documentation build; preview deployment is intentionally skipped."

      - name: Upload verified website artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.DOCUMENTATION_ARTIFACT }}
          path: docs/website/dist/
          if-no-files-found: error
          retention-days: 1

  preview:
    name: Deploy pull request preview
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: docs-preview
    concurrency:
      group: docs-preview-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Download verified website artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.DOCUMENTATION_ARTIFACT }}
          path: docs/website/dist

      - name: Install pinned deploy runtime
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install pinned Wrangler
        run: |
          set -euo pipefail
          npm install --global "wrangler@${WRANGLER_VERSION}"
          test "$(wrangler --version)" = "${WRANGLER_VERSION}"

      - name: Check preview deployment credentials
        id: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [[ -n "${CLOUDFLARE_API_TOKEN}" && -n "${CLOUDFLARE_ACCOUNT_ID}" ]]; then
            echo "available=true" >> "${GITHUB_OUTPUT}"
          else
            echo "available=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::Cloudflare preview deployment skipped because docs-preview environment secrets are not configured."
          fi

      - name: Deploy preview to Cloudflare Pages
        if: steps.cloudflare.outputs.available == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: >-
          wrangler pages deploy docs/website/dist
          --project-name=blackops-docs
          --branch=pr-${{ github.event.pull_request.number }}

  production:
    name: Deploy main production
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: docs-production
    concurrency:
      group: docs-production-main
      cancel-in-progress: true

    steps:
      - name: Download verified website artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.DOCUMENTATION_ARTIFACT }}
          path: docs/website/dist

      - name: Install pinned deploy runtime
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install pinned Wrangler
        run: |
          set -euo pipefail
          npm install --global "wrangler@${WRANGLER_VERSION}"
          test "$(wrangler --version)" = "${WRANGLER_VERSION}"

      - name: Check production deployment credentials
        id: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [[ -n "${CLOUDFLARE_API_TOKEN}" && -n "${CLOUDFLARE_ACCOUNT_ID}" ]]; then
            echo "available=true" >> "${GITHUB_OUTPUT}"
          else
            echo "available=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::Cloudflare production deployment skipped because docs-production environment secrets are not configured."
          fi

      - name: Deploy production to Cloudflare Pages
        if: steps.cloudflare.outputs.available == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: >-
          wrangler pages deploy docs/website/dist
          --project-name=blackops-docs
          --branch=main
