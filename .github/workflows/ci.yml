name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend contract and runtime
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Configure container user
        run: |
          set -euo pipefail
          printf 'HOST_UID=%s\n' "$(id -u)" >> "${GITHUB_ENV}"
          printf 'HOST_GID=%s\n' "$(id -g)" >> "${GITHUB_ENV}"

      - name: Install pinned frontend toolchain
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Verify frontend toolchain versions
        run: |
          set -euo pipefail
          test "$(node --version)" = "v24.18.0"
          test "$(pnpm --version)" = "11.12.0"

      - name: Build development image
        run: docker compose build app

      - name: Install PHP dependencies
        run: docker compose run --rm app composer install --no-interaction --prefer-dist --no-progress

      - name: Install frontend fixture dependencies
        run: pnpm --dir tests/Frontend install --frozen-lockfile

      - name: Compile backend and frontend contracts
        run: |
          set -euo pipefail
          docker compose run --rm app php tests/Frontend/fixture/blackops build:compile
          docker compose run --rm app php tests/Frontend/fixture/blackops frontend:generate
          docker compose run --rm app php tests/Frontend/fixture/blackops frontend:check

      - name: Test generated frontend modules
        run: pnpm --dir tests/Frontend run test

      - name: Guard generated frontend artifacts
        run: |
          set -euo pipefail
          for required_path in \
            examples/quickstart/config/frontend.php \
            examples/quickstart/package.json \
            examples/quickstart/pnpm-lock.yaml \
            examples/quickstart/tsconfig.json \
            examples/quickstart/tsconfig.runtime.json \
            examples/quickstart/resources/js/application/operations.ts \
            examples/quickstart/tests/Frontend/typecheck.ts \
            examples/quickstart/tests/Frontend/real-http.ts; do
            git ls-files --error-unmatch "${required_path}" >/dev/null
          done
          if git ls-files \
            examples/quickstart/resources/js/blackops \
            examples/quickstart/node_modules \
            examples/quickstart/.build \
            tests/Frontend/fixture/var/build \
            tests/Frontend/fixture/resources/js/blackops \
            tests/Frontend/.build | grep -q .; then
            echo "Generated frontend artifacts must not be tracked." >&2
            exit 1
          fi
          if rg -n 'credential-secret|sensitive-value|default-must-not-appear|raw-body' \
            tests/Frontend/fixture/resources/js/blackops; then
            echo "Generated frontend modules contain forbidden runtime data." >&2
            exit 1
          fi

      - name: Clean up frontend fixture
        if: always()
        run: mise exec -- pnpm --dir tests/Frontend run clean

      - name: Clean up frontend Docker resources
        if: always()
        run: docker compose down --volumes --remove-orphans

  website:
    name: Documentation website
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install pinned website toolchain
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Verify toolchain versions
        run: |
          set -euo pipefail
          test "$(node --version)" = "v24.18.0"
          test "$(pnpm --version)" = "11.12.0"

      - name: Install website dependencies
        run: pnpm --dir docs/website install --frozen-lockfile

      - name: Test website content pipeline
        run: pnpm --dir docs/website run test

      - name: Check website
        run: pnpm --dir docs/website run check

      - name: Build website
        run: pnpm --dir docs/website run build

      - name: Guard generated and public boundaries
        run: |
          set -euo pipefail
          if git ls-files docs/website/src/content/docs docs/website/.generated docs/website/dist | grep -q .; then
            echo "Generated website content must not be tracked." >&2
            exit 1
          fi
          if rg -n 'docs/internal|develop/' docs/website/dist docs/website/.generated; then
            echo "Website artifact contains non-public documentation." >&2
            exit 1
          fi

  quality:
    name: Mago, PHPUnit, and Deptrac
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Configure container user
        run: |
          set -euo pipefail
          printf 'HOST_UID=%s\n' "$(id -u)" >> "${GITHUB_ENV}"
          printf 'HOST_GID=%s\n' "$(id -g)" >> "${GITHUB_ENV}"

      - name: Build development image
        run: docker compose build app

      - name: Install dependencies
        run: docker compose run --rm app composer install --no-interaction --prefer-dist --no-progress

      - name: Validate Composer packages
        run: |
          set -euo pipefail
          docker compose run --rm app composer validate --strict
          docker compose run --rm app composer validate --strict examples/quickstart/composer.json

      - name: Run Mago
        run: |
          set -euo pipefail
          docker compose run --rm app mago format --check src tests examples
          docker compose run --rm app mago lint
          docker compose run --rm app mago analyze

      - name: Run PHPUnit
        run: docker compose run --rm app vendor/bin/phpunit

      - name: Run Deptrac
        run: docker compose run --rm app vendor/bin/deptrac

      - name: Clean up Docker resources
        if: always()
        run: docker compose down --volumes --remove-orphans
