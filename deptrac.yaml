deptrac:
  paths:
    - ./src
  layers:
    - name: Core
      collectors:
        - type: classNameRegex
          value: '/^BlackOps\\Core(\\|$)/'
    - name: Journal
      collectors:
        - type: classNameRegex
          value: '/^BlackOps\\Journal(\\|$)/'
    - name: Execution
      collectors:
        - type: classNameRegex
          value: '/^BlackOps\\Execution(\\|$)/'
    - name: Transport
      collectors:
        - type: classNameRegex
          value: '/^BlackOps\\Transport(\\|$)/'
    - name: Http
      collectors:
        - type: classNameRegex
          value: '/^BlackOps\\Http(\\|$)/'
    - name: Logging
      collectors:
        - type: classNameRegex
          value: '/^BlackOps\\Logging(\\|$)/'
    - name: Console
      collectors:
        - type: classNameRegex
          value: '/^BlackOps\\Console(\\|$)/'
    - name: Internal
      collectors:
        - type: classNameRegex
          value: '/^BlackOps\\Internal(\\|$)/'
    - name: Library
      collectors:
        - type: classNameRegex
          value: '/^Monolog(\\|$)/'
        - type: classNameRegex
          value: '/^FastRoute(\\|$)/'
        - type: classNameRegex
          value: '/^Doctrine\\DBAL(\\|$)/'
        - type: classNameRegex
          value: '/^Doctrine\\Migrations(\\|$)/'
        - type: classNameRegex
          value: '/^Psr\\Clock(\\|$)/'
        - type: classNameRegex
          value: '/^Psr\\Cache(\\|$)/'
        - type: classNameRegex
          value: '/^Psr\\Container(\\|$)/'
        - type: classNameRegex
          value: '/^Psr\\Http(\\|$)/'
        - type: classNameRegex
          value: '/^Psr\\Log(\\|$)/'
        - type: classNameRegex
          value: '/^Symfony\\Component\\Console(\\|$)/'
        - type: classNameRegex
          value: '/^Symfony\\Component\\DependencyInjection(\\|$)/'
        - type: classNameRegex
          value: '/^Symfony\\Component\\Stopwatch(\\|$)/'
        - type: classNameRegex
          value: '/^Symfony\\Component\\Uid(\\|$)/'
  ruleset:
    Core: ~
    Journal:
      - Core
    Execution:
      - Core
      - Journal
    Transport:
      - Core
      - Journal
      - Execution
      - Library
    Http:
      - Core
      - Execution
      - Library
    Logging:
      - Core
      - Journal
      - Library
    Console:
      - Core
      - Journal
      - Execution
      - Transport
      - Library
    Internal:
      - Core
      - Journal
      - Execution
      - Transport
      - Http
      - Logging
      - Console
      - Library
